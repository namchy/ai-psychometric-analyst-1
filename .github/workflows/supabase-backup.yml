name: Supabase Database Backup

on:
  workflow_dispatch:

jobs:
  backup:
    name: Create Supabase backup
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Install PostgreSQL 17 client
        run: |
          sudo apt-get update
          sudo apt-get install -y wget ca-certificates lsb-release gnupg
          wget -qO- https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /usr/share/keyrings/postgresql.gpg
          echo "deb [signed-by=/usr/share/keyrings/postgresql.gpg] http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      - name: Create timestamped backup
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          set -Eeuo pipefail

          if [ -z "${SUPABASE_DB_URL:-}" ]; then
            echo "Missing SUPABASE_DB_URL secret"
            exit 1
          fi

          STAMP="$(date -u +"%Y-%m-%d_%H-%M-%S_UTC")"
          BACKUP_ROOT="supabase-backups"
          BACKUP_DIR="$BACKUP_ROOT/$STAMP"

          mkdir -p "$BACKUP_DIR"

          echo "==> Backup folder: $BACKUP_DIR"
          echo "==> PostgreSQL client versions"
          pg_dump --version
          psql --version

          echo "==> Testing connection"
          PGCONNECT_TIMEOUT=20 psql "$SUPABASE_DB_URL" -c "select current_database(), current_user, now();"

          echo "==> Writing manifest"
          {
            echo "Deep Profile Supabase Backup"
            echo "Created at UTC: $(date -u -Iseconds)"
            echo ""
            echo "Contents:"
            echo "- schema.sql"
            echo "- data.sql"
            echo "- full.sql"
            echo "- restore-from-backup.sh"
            echo "- manifest.txt"
            echo "- SHA256SUMS.txt"
            echo ""
            echo "Important:"
            echo "- This is a logical PostgreSQL backup."
            echo "- Supabase Storage file objects are not included."
            echo "- Restore into a new/empty target database whenever possible."
            echo "- Keep this artifact private. It can contain sensitive application data."
          } > "$BACKUP_DIR/manifest.txt"

          echo "==> Creating restore helper"
          {
            echo '#!/usr/bin/env bash'
            echo 'set -Eeuo pipefail'
            echo ''
            echo 'if [ -z "${RESTORE_DB_URL:-}" ]; then'
            echo '  echo "ERROR: Set RESTORE_DB_URL before running."'
            echo '  echo "Example:"'
            echo '  echo "RESTORE_DB_URL='\''postgresql://...'\'' ./restore-from-backup.sh"'
            echo '  exit 1'
            echo 'fi'
            echo ''
            echo 'BACKUP_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"'
            echo ''
            echo 'if [ ! -f "$BACKUP_DIR/full.sql" ]; then'
            echo '  echo "ERROR: Missing full.sql in $BACKUP_DIR"'
            echo '  exit 1'
            echo 'fi'
            echo ''
            echo 'echo "==> Restoring full.sql"'
            echo 'psql "$RESTORE_DB_URL" --variable "ON_ERROR_STOP=1" --file "$BACKUP_DIR/full.sql"'
            echo ''
            echo 'echo "==> Restore completed"'
          } > "$BACKUP_DIR/restore-from-backup.sh"

          chmod +x "$BACKUP_DIR/restore-from-backup.sh"

          echo "==> Dumping schema"
          pg_dump "$SUPABASE_DB_URL" \
            --schema-only \
            --no-owner \
            --no-privileges \
            --file "$BACKUP_DIR/schema.sql"

          echo "==> Dumping data"
          pg_dump "$SUPABASE_DB_URL" \
            --data-only \
            --column-inserts \
            --no-owner \
            --no-privileges \
            --exclude-table='storage.buckets_vectors' \
            --exclude-table='storage.vector_indexes' \
            --file "$BACKUP_DIR/data.sql"

          echo "==> Dumping full backup"
          pg_dump "$SUPABASE_DB_URL" \
            --clean \
            --if-exists \
            --no-owner \
            --no-privileges \
            --exclude-table='storage.buckets_vectors' \
            --exclude-table='storage.vector_indexes' \
            --file "$BACKUP_DIR/full.sql"

          echo "==> Creating checksums"
          (
            cd "$BACKUP_DIR"
            sha256sum schema.sql data.sql full.sql manifest.txt restore-from-backup.sh > SHA256SUMS.txt
          )

          echo "==> Creating archive"
          (
            cd "$BACKUP_ROOT"
            tar -czf "supabase-backup-$STAMP.tar.gz" "$STAMP"
          )

          echo "BACKUP_STAMP=$STAMP" >> "$GITHUB_ENV"
          echo "BACKUP_ARCHIVE=$BACKUP_ROOT/supabase-backup-$STAMP.tar.gz" >> "$GITHUB_ENV"

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: supabase-backup-${{ env.BACKUP_STAMP }}
          path: ${{ env.BACKUP_ARCHIVE }}
          if-no-files-found: error
          retention-days: 7
