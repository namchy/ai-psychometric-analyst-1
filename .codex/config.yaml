notify:
  - powershell.exe
  - -NoProfile
  - -ExecutionPolicy
  - Bypass
  - -Command
  - "[System.Media.SystemSounds]::Beep.Play(); [System.Media.SystemSounds]::Exclamation.Play()"


approvals:
  auto_approve:
    - npm run verify:*
    - npm run dev
    - npm run build
    - npm run typecheck
    - npm run lint